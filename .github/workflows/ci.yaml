name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

env:
  # renovate: datasource=github-releases depName=jdx/mise
  MISE_VERSION: 2026.6.11

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # needed by paths-filter
    outputs:
      gha: ${{ steps.outputs.outputs.gha }}
      go: ${{ steps.outputs.outputs.go }}
      helm: ${{ steps.outputs.outputs.helm }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            gha:
              - '.github/workflows/*.yaml'
              - 'justfile'
              - 'mise.toml'
            go:
              - '.github/workflows/ci.yaml'
              - '**/*.go'
              - '**/*.templ'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'Dockerfile'
              - 'justfile'
              - 'mise.toml'
            helm:
              - '.github/workflows/ci.yaml'
              - 'deploy/**'
              - 'justfile'
              - 'mise.toml'
      - name: paths-filter
        id: outputs
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            {
              echo "gha=true"
              echo "go=true"
              echo "helm=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "gha=${FILTER_GHA}" 
              echo "go=${FILTER_GO}"
              echo "helm=${FILTER_HELM}"
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          FILTER_GHA: ${{ steps.filter.outputs.gha }}
          FILTER_GO: ${{ steps.filter.outputs.go }}
          FILTER_HELM: ${{ steps.filter.outputs.helm }}

  gha:
    name: GHA
    needs: changes
    if: needs.changes.outputs.gha == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}
      - run: just actions-lint

  go:
    name: Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}
      - run: just generate
      - run: just lint
      - run: just test
      - run: just build
      - run: just run-only --help

  helm:
    name: Helm
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}
      - run: just helm-lint
      - run: just helm-conform

  ci-passed:
    name: CI Passed
    needs: [gha, go, helm]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    env:
      GHA_RESULT: ${{ needs.gha.result }}
      GO_RESULT: ${{ needs.go.result }}
      HELM_RESULT: ${{ needs.helm.result }}
    steps:
      - run: |
          [[ "${GHA_RESULT}" != "failure" ]] && \
          [[ "${GO_RESULT}" != "failure" ]] && \
          [[ "${HELM_RESULT}" != "failure" ]]
